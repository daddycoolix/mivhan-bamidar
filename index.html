<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן במדבר כ"ה-כ"ז</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5c842;
  --bg: #0f0c1a;
  --card: #1a1530;
  --card2: #221d3a;
  --text: #f0ecff;
  --muted: #8b82b0;
  --correct: #22c55e;
  --wrong: #ef4444;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 16px 110px;
}
body::before {
  content: '';
  position: fixed;
  top: -20%; right: -20%;
  width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#app { width: 100%; max-width: 500px; position: relative; z-index: 1; }
.screen { animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(18px);} to { opacity:1; transform:none;} }

.start-box { text-align: center; padding: 40px 20px; }
.start-icon { font-size: 72px; margin-bottom: 16px; line-height: 1; }
.start-title { font-size: 30px; font-weight: 900; color: var(--gold); margin-bottom: 8px; line-height: 1.2; }
.start-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; line-height: 1.7; }
.stats-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
.stat { background: var(--card); border: 1px solid rgba(245,200,66,0.18); border-radius: 12px; padding: 10px 18px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 900; color: var(--gold); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

.section-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
.tab-btn {
  padding: 8px 16px; border-radius: 99px; font-family: 'Heebo', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; border: 1.5px solid rgba(245,200,66,0.25);
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.tab-btn.active { background: var(--gold); color: #0f0c1a; border-color: var(--gold); }
.tab-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

.btn-gold {
  width: 100%; padding: 18px; background: var(--gold); color: #0f0c1a;
  border: none; border-radius: var(--radius); font-size: 18px; font-weight: 900;
  font-family: 'Heebo', sans-serif; cursor: pointer;
  box-shadow: 0 4px 28px rgba(245,200,66,0.35); transition: transform 0.1s;
}
.btn-gold:active { transform: scale(0.97); }

.game-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.q-counter { font-size: 13px; color: var(--muted); font-weight: 700; }
.score-badge { background: var(--card); border: 1px solid rgba(245,200,66,0.22); border-radius: 99px; padding: 4px 14px; font-size: 13px; font-weight: 800; color: var(--gold); }
.progress-wrap { background: rgba(255,255,255,0.08); border-radius: 99px; height: 5px; margin-bottom: 18px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 99px; transition: width 0.4s ease; }

.section-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

.q-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 22px 18px; margin-bottom: 14px; }
.q-badge { display: inline-block; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 99px; margin-bottom: 10px; letter-spacing: 0.04em; }
.badge-mc { background: rgba(245,200,66,0.13); color: var(--gold); }
.badge-open { background: rgba(160,100,255,0.15); color: #c4a8ff; }
.q-text { font-size: 16px; font-weight: 700; line-height: 1.65; }
.q-source { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; font-style: italic; }

.options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
.opt-btn {
  width: 100%; text-align: right; padding: 13px 16px;
  background: var(--card2); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text); font-size: 14px;
  font-family: 'Heebo', sans-serif; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
}
.opt-btn:hover:not(:disabled) { border-color: rgba(245,200,66,0.45); background: rgba(245,200,66,0.05); }
.opt-btn:disabled { cursor: default; }
.opt-letter { min-width: 26px; height: 26px; border-radius: 7px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 1px; }
.opt-btn.correct { background: rgba(34,197,94,0.12); border-color: var(--correct); }
.opt-btn.correct .opt-letter { background: var(--correct); color: #fff; }
.opt-btn.wrong { background: rgba(239,68,68,0.1); border-color: var(--wrong); }
.opt-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }

.open-area {
  width: 100%; background: var(--card2); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif;
  font-size: 14px; padding: 13px 16px; min-height: 80px; resize: vertical;
  margin-bottom: 10px; outline: none; transition: border-color 0.15s; line-height: 1.6;
}
.open-area:focus { border-color: rgba(245,200,66,0.4); }
.model-answer { background: rgba(160,100,255,0.1); border: 1px solid rgba(160,100,255,0.25); border-radius: 12px; padding: 13px 16px; font-size: 14px; line-height: 1.75; color: #ddd6fe; margin-bottom: 12px; display: none; }
.model-answer.show { display: block; }
.model-answer strong { color: #c4a8ff; }

.feedback-bar { border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 14px; display: none; animation: pop 0.2s ease; }
@keyframes pop { from { transform: scale(0.94); } to { transform: scale(1); } }
.feedback-bar.show { display: block; }
.feedback-correct { background: rgba(34,197,94,0.15); color: var(--correct); border: 1px solid rgba(34,197,94,0.3); }
.feedback-wrong { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.feedback-open { background: rgba(160,100,255,0.1); color: #c4a8ff; border: 1px solid rgba(160,100,255,0.25); }

.action-row { display: flex; gap: 10px; }
.btn-secondary { flex: 1; padding: 14px; background: transparent; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-secondary:hover { background: rgba(255,255,255,0.05); }
.btn-next { flex: 2; padding: 14px; background: var(--gold); color: #0f0c1a; border: none; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 900; cursor: pointer; transition: transform 0.1s; display: none; }
.btn-next.show { display: block; }
.btn-next:active { transform: scale(0.97); }

.hint-float { position: fixed; bottom: 24px; left: 16px; z-index: 100; display: none; }
.hint-btn { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; border: none; border-radius: 99px; padding: 13px 22px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 24px rgba(124,58,237,0.55); display: flex; align-items: center; gap: 8px; transition: transform 0.1s; }
.hint-btn:active { transform: scale(0.95); }

.hint-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 16px; animation: fadeIn2 0.2s ease; }
@keyframes fadeIn2 { from { opacity:0; } to { opacity:1; } }
.hint-overlay.hidden { display: none; }
.hint-modal { background: #1e1835; border: 1px solid rgba(168,85,247,0.35); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 500px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(30px); } to { transform: none; } }
.hint-modal-title { font-size: 22px; font-weight: 900; color: #a855f7; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.hint-modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.hint-answer { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 600; color: #ddd6fe; line-height: 1.75; margin-bottom: 16px; }
.hint-close { width: 100%; padding: 14px; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; color: #a855f7; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; }

.result-box { text-align: center; padding: 32px 20px; }
.result-icon { font-size: 72px; margin-bottom: 16px; }
.result-title { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
.big-score { font-size: 72px; font-weight: 900; color: var(--gold); line-height: 1; margin: 12px 0; }
.score-label { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.r-stat { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; }
.r-stat-num { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
.r-stat-lbl { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div id="app"></div>

<div class="hint-overlay hidden" id="hint-overlay">
  <div class="hint-modal">
    <div class="hint-modal-title">💡 רמז ענק</div>
    <div class="hint-modal-sub">בטוח? זה הרמז הכי גדול שיש...</div>
    <div class="hint-answer" id="hint-text"></div>
    <button class="hint-close" onclick="closeHint()">הבנתי, סגור</button>
  </div>
</div>

<div class="hint-float" id="hint-float">
  <button class="hint-btn" onclick="openHint()">💡 רמז ענק</button>
</div>

<script>
const sections = [
  { label: 'פרק כ"ה - חטא בעל פעור', short: 'כ"ה' },
  { label: 'פרק כ"ה - זמרי ופינחס', short: 'זמרי' },
  { label: 'פרק כ"ו - המפקד', short: 'כ"ו' },
  { label: 'פרק כ"ז - בנות צלפחד', short: 'כ"ז א' },
  { label: 'פרק כ"ז - יהושע', short: 'כ"ז ב' },
];

const allQ = [
  // === פרק כ"ה - חטא בעל פעור ===
  {
    sec: 0,
    type: 'mc',
    q: 'מה היה תחילת חטאם של ישראל בשיטים?',
    opts: ['עבודת בעל פעור', 'זנות עם בנות מואב', 'אכילה מזבחי האלילים', 'קבלת לחם מהמואבים'],
    ans: 1,
    hint: 'ספורנו: "ויחל העם לזנות - תחילת עניינם לא היה לעבוד עבודה זרה כלל, אבל לזנות בלבד"',
    src: 'במדבר כה, א; ספורנו'
  },
  {
    sec: 0,
    type: 'mc',
    q: 'לאיזה חטא חמור יותר הגיעו ישראל בעקבות חטאם הראשון?',
    opts: ['גנבה ממואב', 'עבודה זרה - השתחוות לאלוהי מואב', 'מרידה במשה', 'הקרבת קורבנות שלא במקום'],
    ans: 1,
    hint: 'ספורנו: "שכך דרכו של יצר הרע לצאת מרעה אל רעה" - מזנות לעבודה זרה',
    src: 'במדבר כה, ב-ג; ספורנו'
  },
  {
    sec: 0,
    type: 'open',
    q: 'כיצד מסביר ספורנו את התהליך ההדרגתי בחטא? וכיצד האזהרה בשמות לד מבססת את דבריו?',
    hint: 'ספורנו: "דרכו של יצר הרע לצאת מרעה אל רעה" - תחילה זנות, אחר עבודה זרה. שמות לד מזהיר בדיוק על שרשרת זו: "וקרא לך ואכלת מזבחו... וזנו בנותיו... והזנו את בניך"',
    modelAns: 'ספורנו מסביר שתחילת חטאם לא הייתה עבודה זרה, אלא זנות בלבד. אך "דרכו של יצר הרע לצאת מרעה אל רעה" - מחטא קל לחמור. האזהרה בשמות לד מבססת זאת כי היא מתארת בדיוק את אותה שרשרת: קשר עם בנות האומות → אכילה מזבחיהן → זנות → עבודה זרה.'
  },
  {
    sec: 0,
    type: 'mc',
    q: 'מה ציווה ה\' את משה לעשות עם ראשי העם? (לפי רש"י)',
    opts: ['להגלותם למדבר', 'לשפוט ולתלות את העובדים לפעור לעיני כל', 'להביאם לפני אלעזר הכהן', 'להחרים את רכושם'],
    ans: 1,
    hint: 'רש"י: "קח את כל ראשי העם כדי לשפוט את העובדים לפעור - והוקע (ותלה) אותם נגד השמש - לעיני כולם"',
    src: 'במדבר כה, ד; רש"י'
  },
  {
    sec: 0,
    type: 'mc',
    q: 'מהו חטאם של ראשי העם לפי ר\' יודן?',
    opts: ['עבדו בעצמם לבעל פעור', 'לא מיחו בחוטאים ולא מנעו מהם לחטוא', 'הביאו את בנות מואב למחנה', 'הסתירו את החוטאים'],
    ans: 1,
    hint: 'ר\' יודן: "ראשי העם תלה על שלא מיחו בבני אדם" - אחריות המנהיג על מעשי הציבור',
    src: 'במדבר כה, ד; ר\' יודן'
  },
  // === פרק כ"ה - זמרי ופינחס ===
  {
    sec: 1,
    type: 'mc',
    q: 'מה עשה זמרי בן סלוא ומה הייתה מטרתו?',
    opts: [
      'לקח נשק מהמדיינים',
      'הביא את כזבי לעיני משה וטען שמשה עצמו נשא אשה מדיינית',
      'ניסה לברוח עם כזבי מהמחנה',
      'ניסה לשכנע את משה לאפשר נישואין עם המדייניות'
    ],
    ans: 1,
    hint: 'זמרי הביא את כזבי לעיני משה ואמר: "אשה זו אסורה או מותרת? ואם תאמר אסורה, אז התיר לך להתחתן עם בת יתרו המדיינית" - טיעון שקרי כי משה גייר אותה לפני מתן תורה.',
    src: 'במדבר כה, ו; מדרש'
  },
  {
    sec: 1,
    type: 'mc',
    q: 'מה הייתה תגובת משה כשזמרי הביא את כזבי לעיניו?',
    opts: [
      'ציווה מיד להרוג את זמרי',
      'נתעלמה ממנו ההלכה ולא הגיב',
      'קרא לאלעזר הכהן לפסוק',
      'פנה לה\' בתפילה'
    ],
    ans: 1,
    hint: 'ממשה נתעלמה ההלכה שצריך להרוג את זמרי על מעשהו, ובני ישראל געו כולם בבכיה',
    src: 'במדבר כה, ו; רש"י'
  },
  {
    sec: 1,
    type: 'mc',
    q: 'כמה מתו במגפה שקדמה למעשה פינחס?',
    opts: ['12,000', '24,000', '36,000', '3,000'],
    ans: 1,
    hint: 'במדבר כה, ט - "ויהיו המתים במגפה ארבעה ועשרים אלף"',
    src: 'במדבר כה, ט'
  },
  {
    sec: 1,
    type: 'mc',
    q: 'מה משמעות "ברית שלום" שקיבל פינחס - לפי אב"ע?',
    opts: [
      'שלא יילחם עוד במלחמות',
      'הבטחה שלא יפגע משבט שמעון וגואלי דם זמרי שעמדו עליו',
      'שיכהן ככהן גדול',
      'שיורש את תפקיד משה'
    ],
    ans: 1,
    hint: 'אב"ע: "מפני שעמדו נגד שבט שמעון, וגואל דם זמרי הבטיח לו שלום" - פינחס היה בסכנה ממשית',
    src: 'במדבר כה, יב; אב"ע'
  },
  {
    sec: 1,
    type: 'mc',
    q: 'מדוע לפי רש"י קיבל פינחס ברית כהונת עולם, והרי כהונה כבר ניתנה לזרע אהרון?',
    opts: [
      'כי הוא היה הגדול בבניו של אהרון',
      'כי פינחס נולד לפני המשיחה ולא נכלל בה - ונעשה כהן רק עכשיו בשכר מעשהו',
      'כי אלעזר אביו ויתר לו על הכהונה',
      'כי ה\' ביטל את הכהונה מבני אהרון'
    ],
    ans: 1,
    hint: 'רש"י: "פינחס הנכד שנולד קודם לכן ולא נמשח, לא נכלל בכהונה. מכאן שפינחס נהיה לכהן רק לאחר שהרג את זמרי"',
    src: 'במדבר כה, יג; רש"י'
  },
  {
    sec: 1,
    type: 'mc',
    q: 'מדוע נצטוו ישראל "צרור את המדיינים" אך לא נצטוו כך על מואב?',
    opts: [
      'כי מואב הייתה חזקה יותר',
      'כי בנות מואב פעלו מתוך אהבה ולא עצה',
      'כי עתידה רות המואביה לצאת מהם, שממנה יצא דוד המלך',
      'כי מלך מואב בלק כבר הוענש בנפרד'
    ],
    ans: 2,
    hint: 'על מואב לא ציווה ה\' להשמיד, מפני שעתידה רות המואביה לצאת מהם, שממנה יצא דוד המלך',
    src: 'במדבר כה, יז; מדרש'
  },
  {
    sec: 1,
    type: 'open',
    q: 'מה היה שכרו של פינחס - פרט את שתי הברכות שקיבל ומה הביא כל אחת מהן?',
    hint: 'א. ברית שלום - הגנה מגואלי דם זמרי (אב"ע), וכן כי עשה טוב ה\' גומל לו (רש"י). ב. ברית כהונת עולם - כי לא נכלל קודם בכהונה, ועכשיו קיבלה בזכות מעשהו.',
    modelAns: 'א. ברית שלום - לפי אב"ע: הגנה מגואלי דם שבט שמעון שעמדו עליו. לפי רש"י: ה\' גומל לו טובה על שעשה טוב. ב. ברית כהונת עולם - לו ולזרעו. לפי רש"י, פינחס נולד לפני שנמשחו הכהנים ולא נכלל בכהונה. עכשיו, בשכר מעשהו, קיבל כהונה.'
  },
  // === פרק כ"ו - המפקד ===
  {

function init() {
  mode = 'start';
  selectedSections = [];
  gameQ = [];
  cur = 0; score = 0; correctCount = 0; wrongCount = 0;
  render();
}

function render() {
  const app = document.getElementById('app');
  const hf = document.getElementById('hint-float');
  if (mode === 'start') { hf.style.display='none'; renderStart(app); }
  else if (mode === 'select') { hf.style.display='none'; renderSelect(app); }
  else if (mode === 'game') { hf.style.display='flex'; renderGame(app); }
  else { hf.style.display='none'; renderResult(app); }
}

function toggleSec(i) {
  const idx = selectedSections.indexOf(i);
  if (idx >= 0) selectedSections.splice(idx,1);
  else selectedSections.push(i);
  renderSelect(document.getElementById('app'));
}

function startAll() {
  setupGame(allQ);
}
function startSelected() {
  if (selectedSections.length === 0) return;
  const q = allQ.filter(q => selectedSections.includes(q.sec));
  setupGame(q);
}
function setupGame(q) {
  gameQ = q;
  cur = 0; score = 0; correctCount = 0; wrongCount = 0;
  answered = new Array(q.length).fill(false);
  fbClass = new Array(q.length).fill('');
  fbText = new Array(q.length).fill('');
  openVals = new Array(q.length).fill('');
  mode = 'game';
  render();
}

      if (done && i === q.ans) cls += ' correct';
      if (done && fbClass[cur]==='feedback-wrong' && i !== q.ans) cls += '';
      return `<button class="${cls}" id="o${i}" onclick="pickMC(${i})" ${done?'disabled':''}><span class="opt-letter">${letters[i]}</span><span>${opt}</span></button>`;
    }).join('') + `</div>`;
  } else {
    body = `
      <textarea class="open-area" id="ota" placeholder="כתוב את תשובתך כאן..." ${done?'readonly':''}>${openVals[cur]||''}</textarea>
      <div class="model-answer ${done?'show':''}">${q.modelAns||''}</div>`;
  }

  const fbHtml = done ? `<div class="feedback-bar show ${fbClass[cur]}">${fbText[cur]}</div>` : '';

  let actionHtml = '';
  if (!done && q.type === 'open') {
    actionHtml = `<div class="action-row"><button class="btn-secondary" onclick="submitOpen()">הצג תשובה מדגם</button></div>`;
  } else if (done) {
    actionHtml = `<div class="action-row"><button class="btn-next show" onclick="nextQ()">${cur===gameQ.length-1?'לתוצאות 🏆':'הבאה ←'}</button></div>`;
  }

  app.innerHTML = `<div class="screen">
    <div class="game-top">
      <span class="q-counter">שאלה ${cur+1} / ${gameQ.length}</span>
      <span class="score-badge">⭐ ${score}</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section-label">${secLabel}</div>
    <div class="q-card">
      <span class="q-badge ${q.type==='mc'?'badge-mc':'badge-open'}">${q.type==='mc'?'רב-ברירה':'שאלה פתוחה'}</span>
      <div class="q-text">${q.q}</div>
      ${q.src ? `<div class="q-source">${q.src}</div>` : ''}
    </div>
    ${body}
    ${fbHtml}
    ${actionHtml}
  </div>`;
}

function pickMC(chosen) {
  const q = gameQ[cur];
  if (answered[cur]) return;
  answered[cur] = true;
  const isRight = chosen === q.ans;
  if (isRight) { score++; correctCount++; fbClass[cur]='feedback-correct'; fbText[cur]='✅ נכון! כל הכבוד'; }
  else { wrongCount++; fbClass[cur]='feedback-wrong'; fbText[cur]='❌ לא נכון. התשובה: ' + q.opts[q.ans]; }
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    if (i === chosen && !isRight) b.classList.add('wrong');
  });
  const fb = document.createElement('div');
  fb.className = 'feedback-bar show ' + fbClass[cur];
  fb.textContent = fbText[cur];
  const opts = document.querySelector('.options');
  opts.after(fb);
  const btn = document.createElement('div');
  btn.className = 'action-row';
  btn.innerHTML = `<button class="btn-next show" onclick="nextQ()">${cur===gameQ.length-1?'לתוצאות 🏆':'הבאה ←'}</button>`;
  fb.after(btn);
}

function submitOpen() {
  const ta = document.getElementById('ota');
  if (ta) openVals[cur] = ta.value;
  answered[cur] = true;
  fbClass[cur] = 'feedback-open';
  fbText[cur] = 'ראה את תשובת המדגם למעלה';
  render();
}

function nextQ() {
  cur++;
  if (cur >= gameQ.length) mode = 'result';
  render();
}

function renderResult(app) {
  const mc = gameQ.filter(q=>q.type==='mc').length;
  const pct = mc > 0 ? Math.round((correctCount/mc)*100) : 0;
  let emoji='🏆', msg='מצוין! שולט בחומר';
  if(pct<90){emoji='😊';msg='טוב מאוד!';}
  if(pct<70){emoji='📚';msg='כדאי לחזור על החומר';}
  if(pct<50){emoji='💪';msg='לנסות שוב!';}

  app.innerHTML = `<div class="screen result-box">
    <div class="result-icon">${emoji}</div>
    <div class="result-title">${msg}</div>
    <div class="big-score">${mc>0?correctCount+'/'+mc:'—'}</div>
    <div class="score-label">שאלות רב-ברירה נכונות</div>
    <div class="result-grid">
      <div class="r-stat"><div class="r-stat-num" style="color:var(--correct)">${correctCount}</div><div class="r-stat-lbl">נכונות</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:var(--wrong)">${wrongCount}</div><div class="r-stat-lbl">שגויות</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:var(--gold)">${mc>0?pct+'%':'—'}</div><div class="r-stat-lbl">הצלחה</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:#a855f7">${score}</div><div class="r-stat-lbl">ניקוד</div></div>
    </div>
    <button class="btn-gold" style="margin-bottom:12px" onclick="setupGame(gameQ)">שחק שוב אותן שאלות</button>
    <button class="btn-gold" style="background:rgba(245,200,66,0.15);color:var(--gold);box-shadow:none;border:1.5px solid rgba(245,200,66,0.3)" onclick="init()">חזור לתפריט</button>
  </div>`;
}

function openHint() {
  if (mode !== 'game' || cur >= gameQ.length) return;
  document.getElementById('hint-text').textContent = gameQ[cur].hint;
  document.getElementById('hint-overlay').classList.remove('hidden');
}
function closeHint() {
  document.getElementById('hint-overlay').classList.add('hidden');
}
document.getElementById('hint-overlay').addEventListener('click', function(e){
  if(e.target===this) closeHint();
});

init();
</script>
</body>
</html>
