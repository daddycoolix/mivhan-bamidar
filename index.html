<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן במדבר כ"ה וכ"ז</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:    #63c5a8;
  --accent:  #5ba8d4;
  --bg:      #0d1b22;
  --card:    #152530;
  --card2:   #1c3040;
  --text:    #e2f0ec;
  --muted:   #5d8a96;
  --correct: #4dd696;
  --wrong:   #e87070;
  --radius:  16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 16px 80px;
}
body::before {
  content: '';
  position: fixed;
  top: -20%; right: -20%;
  width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(99,197,168,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#app { width: 100%; max-width: 540px; position: relative; z-index: 1; }
.screen { animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(18px);} to { opacity:1; transform:none;} }

/* ===== START SCREEN ===== */
.start-box { text-align: center; padding: 40px 20px; }
.start-icon { font-size: 80px; margin-bottom: 16px; line-height: 1; }
.start-title { font-size: 34px; font-weight: 900; color: var(--gold); margin-bottom: 10px; line-height: 1.2; }
.start-sub { font-size: 17px; color: var(--muted); margin-bottom: 28px; line-height: 1.8; }
.stats-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
.stat { background: var(--card); border: 1px solid rgba(99,197,168,0.2); border-radius: 12px; padding: 12px 20px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 900; color: var(--gold); }
.stat-lbl { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ===== BUTTONS ===== */
.btn-gold {
  width: 100%; padding: 20px; background: var(--gold); color: #0f0c1a;
  border: none; border-radius: var(--radius); font-size: 20px; font-weight: 900;
  font-family: 'Heebo', sans-serif; cursor: pointer;
  box-shadow: 0 4px 28px rgba(99,197,168,0.28); transition: transform 0.1s;
}
.btn-gold:active { transform: scale(0.97); }

/* ===== GAME TOP ===== */
.game-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.q-counter { font-size: 15px; color: var(--muted); font-weight: 700; }
.score-badge { background: var(--card); border: 1px solid rgba(99,197,168,0.28); border-radius: 99px; padding: 5px 16px; font-size: 15px; font-weight: 800; color: var(--gold); }
.progress-wrap { background: rgba(255,255,255,0.08); border-radius: 99px; height: 6px; margin-bottom: 18px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--gold),var(--accent)); border-radius: 99px; transition: width 0.4s ease; }
.section-label { font-size: 13px; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

/* ===== QUESTION CARD ===== */
.q-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 24px 20px; margin-bottom: 14px; }
.q-badge { display: inline-block; font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 99px; margin-bottom: 12px; letter-spacing: 0.04em; }
.badge-mc   { background: rgba(99,197,168,0.14); color: var(--gold); }
.badge-open { background: rgba(160,100,255,0.15); color: #c4a8ff; }
.badge-study{ background: rgba(91,168,212,0.14);  color: var(--accent); }

/* Summary box before question */
.q-summary {
  background: rgba(255,255,255,0.03);
  border-right: 2px solid rgba(99,197,168,0.22);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.8;
  color: #9e96bc;
}
.q-summary .sum-title {
  font-size: 11px;
  font-weight: 800;
  color: rgba(99,197,168,0.55);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.q-summary .sum-body { font-size: 14px; line-height: 1.8; color: #8a82a8; }
.q-summary .sum-body strong { color: #b0a8cc; font-weight: 700; }
.q-summary .sum-body em { color: #8a82a8; font-style: normal; }

.q-text { font-size: 20px; font-weight: 800; line-height: 1.85; }
.q-text em     { color: #a8d8a8; font-style: normal; }
.q-text strong { color: var(--gold); font-weight: 900; }
.q-source { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; font-style: italic; }

/* Multi-answer notice */
.multi-notice {
  background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #c4a8ff;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===== OPTIONS ===== */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.opt-btn {
  width: 100%; text-align: right; padding: 15px 18px;
  background: var(--card2); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text); font-size: 16px;
  font-family: 'Heebo', sans-serif; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: flex-start; gap: 12px; line-height: 1.6;
}
.opt-btn:hover:not(:disabled) { border-color: rgba(99,197,168,0.45); background: rgba(99,197,168,0.06); }
.opt-btn:disabled { cursor: default; }
.opt-letter { min-width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
.opt-btn.correct { background: rgba(34,197,94,0.12); border-color: var(--correct); }
.opt-btn.correct .opt-letter { background: var(--correct); color: #fff; }
.opt-btn.wrong { background: rgba(239,68,68,0.1); border-color: var(--wrong); }
.opt-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }

/* ===== OPEN ANSWER ===== */
.open-area {
  width: 100%; background: var(--card2); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif;
  font-size: 16px; padding: 15px 18px; min-height: 90px; resize: vertical;
  margin-bottom: 10px; outline: none; transition: border-color 0.15s; line-height: 1.7;
}
.open-area:focus { border-color: rgba(99,197,168,0.45); }
.model-answer { background: rgba(99,197,168,0.08); border: 1px solid rgba(99,197,168,0.22); border-radius: 12px; padding: 15px 18px; font-size: 16px; line-height: 1.85; color: #b8eed8; margin-bottom: 12px; display: none; }
.model-answer.show { display: block; }
.model-answer strong { color: var(--gold); }

/* ===== FEEDBACK ===== */
.feedback-bar { border-radius: 12px; padding: 14px 18px; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 14px; display: none; animation: pop 0.2s ease; }
@keyframes pop { from { transform: scale(0.94); } to { transform: scale(1); } }
.feedback-bar.show { display: block; }
.feedback-correct { background: rgba(34,197,94,0.15); color: var(--correct); border: 1px solid rgba(34,197,94,0.3); }
.feedback-wrong   { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.feedback-open    { background: rgba(99,197,168,0.1); color: var(--gold); border: 1px solid rgba(99,197,168,0.28); }

/* ===== ACTION ROW ===== */
.action-row { display: flex; gap: 10px; }
.btn-secondary { flex: 1; padding: 15px; background: transparent; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-secondary:hover { background: rgba(255,255,255,0.05); }
.btn-next { flex: 2; padding: 15px; background: var(--gold); color: #0f0c1a; border: none; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; transition: transform 0.1s; display: none; }
.btn-next.show { display: block; }
.btn-next:active { transform: scale(0.97); }

/* ===== BOTTOM HINT BAR (fixed) ===== */
.hint-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: none;
  background: #0a1820;
  border-top: 1px solid rgba(99,197,168,0.15);
  padding: 10px 16px;
  align-items: center;
  gap: 10px;
  max-width: 100%;
}
.hint-bar-small {
  flex: 1;
  font-size: 13px;
  color: #8a7faa;
  line-height: 1.5;
  text-align: right;
  padding-right: 4px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.hint-bar-small strong { color: #9dd8cc; }
.hint-bar-btn {
  flex-shrink: 0;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 11px 18px;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 14px rgba(124,58,237,0.5);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: transform 0.1s;
}
.hint-bar-btn:active { transform: scale(0.95); }
/* keep old hint-float hidden - not used */
.hint-float { display: none !important; }

.hint-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 16px; animation: fadeIn2 0.2s ease; }
@keyframes fadeIn2 { from { opacity:0; } to { opacity:1; } }
.hint-overlay.hidden { display: none; }
.hint-modal { background: #1e1835; border: 1px solid rgba(168,85,247,0.35); border-radius: 20px; padding: 26px 22px; width: 100%; max-width: 540px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(30px); } to { transform: none; } }
.hint-modal-title { font-size: 24px; font-weight: 900; color: #a855f7; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.hint-modal-sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
.hint-answer { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); border-radius: 12px; padding: 16px 18px; font-size: 16px; font-weight: 600; color: #ddd6fe; line-height: 1.85; margin-bottom: 16px; }
.hint-close { width: 100%; padding: 15px; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; color: #a855f7; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; }

/* ===== SELECT SCREEN ===== */
.sel-item { cursor:pointer; border-radius:12px; padding:15px 18px; display:flex; justify-content:space-between; align-items:center; transition: all 0.15s; }

/* ===== RESULT SCREEN ===== */
.result-box { text-align: center; padding: 32px 20px; }
.result-icon { font-size: 80px; margin-bottom: 16px; }
.result-title { font-size: 30px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
.big-score { font-size: 80px; font-weight: 900; color: var(--gold); line-height: 1; margin: 12px 0; }
.score-label { font-size: 16px; color: var(--muted); margin-bottom: 28px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.r-stat { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 18px; }
.r-stat-num { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
.r-stat-lbl { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div id="app"></div>

<div class="hint-overlay hidden" id="hint-overlay">
  <div class="hint-modal">
    <div class="hint-modal-title">💡 רמז ענק</div>
    <div class="hint-modal-sub">הרמז הכי גדול שיש - השתמש בו בחוכמה!</div>
    <div class="hint-answer" id="hint-text"></div>
    <button class="hint-close" onclick="closeHint()">הבנתי, סגור</button>
  </div>
</div>

<div class="hint-bar" id="hint-bar">
  <div class="hint-bar-small" id="hint-bar-small"></div>
  <button class="hint-bar-btn" onclick="openHint()">💡 רמז ענק</button>
</div>

{sec:5,type:'mc',summary:'פרק יא מהווה מפנה. הגמרא (שבת נו) שואלת: האם שלמה חטא? רבי יונתן: מי שאומר שלמה חטא - טועה. אך שלמה היה צריך למחות בנשיו ולא מיחה, ולכן הכתוב מעלה עליו <strong>כאילו</strong> חטא.',q:'לפי רבי יונתן, האם שלמה עבד ע\"ז בפועל? ומה <strong>כן</strong> נדרש ממנו?',opts:['כן, עבד ע\"ז בפועל','לא חטא בפועל - היה צריך למחות בנשיו ולא מיחה','לא חטא כלל','חטא רק בנישואין'],ans:1,smallHint:'שבת נו: מיחטא נמי לא חטא - אבל היה לו למחות...',bigHint:'גמרא שבת נו: כל האומר שלמה חטא אינו אלא טועה... אלא מפני שהיה לו למחות בנשיו ולא מיחה, מעלה עליו הכתוב כאילו חטא.',src:'מלכים א יא, ד; שבת נו'},
{sec:5,type:'mc',summary:'מדוע שלמה נשא נשים גויות? הכלי יקר: מטרה דתית - להכניע האומות לה\'. המלבי\"ם: מטרה מדינית - ברית עם מלכים שכנים.',q:'מה ההבדל בין הסבר <strong>הכלי יקר</strong> לבין הסבר <strong>המלבי\"ם</strong> לנישואי שלמה?',opts:['שניהם: זו הייתה טעות','כלי יקר: דתית - להכניע עמים לה\'; מלבי\"ם: מדינית - ברית עם שכנים','כלי יקר: מדינית; מלבי\"ם: דתית','שניהם: זו הייתה מצווה'],ans:1,smallHint:'כלי יקר = להכניע לה\'. מלבי\"ם = ברית מדינית.',bigHint:'כלי יקר: להכניע עמים תחת עבודת ה\'. מלבי\"ם: ויתחתן שלמה... ובזה ימצא עזר מצריו מבחוץ.',src:'מלכים א יא, א; כלי יקר, מלבי\"ם'},
{sec:5,type:'mc',summary:'הגמרא: מדוע לא גילתה התורה טעמי מצוותיה? כי שלמה הבין הטעם ואמר: אקיים הטעם בלי הגזירה. בשני האיסורים - נשים וסוסים - נכשל.',q:'לפי הגמרא (סנהדרין כא), מהם <strong>שני האיסורים</strong> שיש למלך ובמה נכשל שלמה?',opts:['לא ירבה זהב; לא יבנה ערים','לא ירבה נשים (פן יטו לבבו); לא ירבה סוסים (פן יחזיר עם למצרים)','לא ירבה עבדים; לא ירבה נשים','לא יצא למלחמה; לא ירבה כסף'],ans:1,smallHint:'דברים יז: שני איסורים - נשים וסוסים.',bigHint:'סנהדרין כא: לא ירבה נשים + לא ירבה סוסים. שלמה אמר על כל אחד: אני ארבה ולא אסור - ובשניהם נכשל.',src:'מלכים א יא; דברים יז; סנהדרין כא'},
{sec:5,type:'open',summary:'ה\' מכריז על עונש שלמה: קריעת הממלכה. המלבי\"ם: א. שלמה לא גירש ע\"ז מרשותו. ב. קריעת הממלכה - מדה כנגד מדה. ג. לא בימיו - בזכות דוד.',q:'לפי המלבי\"ם: א. על מה עבר שלמה? ב. מהו עונשו? ג. מתי יתקיים ומדוע לא מיד?',smallHint:'א. לא ביער ע\"ז מרשותו. ב. קריעת הממלכה. ג. לאחר מותו - בזכות דוד.',bigHint:'א. ולא שמרת בריתי לבער הע\"ז. ב. קרוע אקרע - מדה כנגד מדה. ג. אך בימיך לא אעשנה למען דוד אביך.',modelAns:'<strong>א. החטא:</strong> לא גירש ע\"ז מרשותו.<br><strong>ב. העונש:</strong> קריעת הממלכה - מדה כנגד מדה.<br><strong>ג. העיתוי:</strong> לא בימיו - בזכות דוד שהמלכות ניתנה לו בלא תנאי.',src:'מלכים א יא, ט-יב; מלבי\"ם'},
{sec:5,type:'mc',summary:'אחיה קרע שמלה לשנים עשר חתיכות. מי קרע - אחיה או ירבעם? הרד\"ק: שתי דעות. המסתברת - אחיה, כי כך נוהגים צדיקים.',q:'לפי הרד\"ק, מי קרע את השמלה והיא האפשרות המסתברת?',opts:['ירבעם - כי הוא קיבל הנחלה','אחיה - כי כך דרך הצדיקים לקרוע בצער על מחלוקת בית דוד','שניהם יחד','לא ידוע'],ans:1,smallHint:'רד\"ק: מסתבר כמאן דאמר של אחיה - כי כך דרך צדיקים.',bigHint:'רד\"ק: רב ולוי נחלקו. אמר ר\' שמואל: מסתבר כמאן דאמר של אחיה - שכן דרך של צדיקים להיות קורעים במחלוקת של בית דוד.',src:'מלכים א יא, ל; רד\"ק'},

{sec:7,type:'mc',summary:'אחאב עשה תועבות. לאחר בניית יריחו - אליהו נשבע שלא יהיה גשם. מדוע? רש\"י: אחאב אמר לאליהו שקללת משה (עצירת גשמים) לא נתקיימה - ואליהו הוכיח לו מיד.',q:'לפי רש\"י, מה גרם לאליהו להישבע על עצירת הגשמים?',opts:['כי יריחו הייתה עיר קדושה','אחאב אמר: קללת משה על ע\"ז לא נתקיימה - ואליהו הוכיח לו אחרת','כי ירבעם בנה יריחו','כי יריחו הייתה הבירה'],ans:1,smallHint:'רש\"י: אחאב טען שקללת משה לא נתקיימה - ואליהו נשבע להוכיח שנתקיימה.',bigHint:'רש\"י: הלכו אליהו ואחאב לנחם את חיאל. אמר אחאב: אפשר שקללת יהושע נתקיימה וקללת משה לא נתקיימה?! ויאמר אליהו...',src:'מלכים א יז, א; רש\"י'},

];

// ===== GAME STATE =====
const SECTIONS = sections.length;
let mode = 'start';
let selectedSections = [];
let gameQ = [];
let cur = 0, score = 0, correctCount = 0, wrongCount = 0;
let answered = [], fbClass = [], fbText = [], openVals = [];

function init() {
  mode = 'start'; selectedSections = []; gameQ = [];
  cur = 0; score = 0; correctCount = 0; wrongCount = 0;
  render();
}

function render() {
  const app = document.getElementById('app');
  const hf  = document.getElementById('hint-bar');
  if (mode === 'start')       { hf.style.display='none'; renderStart(app); }
  else if (mode === 'select') { hf.style.display='none'; renderSelect(app); }
  else if (mode === 'game')   { hf.style.display='flex'; renderGame(app); }
  else                        { hf.style.display='none'; renderResult(app); }
}

function renderStart(app) {
  const total = allQ.length;
  const mc    = allQ.filter(q=>q.type==='mc').length;
  const open  = allQ.filter(q=>q.type==='open').length;
  app.innerHTML = `<div class="screen start-box">
    <div class="start-icon">📖</div>
    <div class="start-title">מבחן עיון<br>במדבר כ"ה וכ"ז</div>
    <div class="start-sub">שאלות על חטא בעל פעור, פינחס,<br>בנות צלפחד ומינוי יהושע.<br>יש רמז קטן + רמז ענק לכל שאלה 😏</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">סה"כ שאלות</div></div>
      <div class="stat"><div class="stat-num">${mc}</div><div class="stat-lbl">רב-ברירה</div></div>
      <div class="stat"><div class="stat-num">${open}</div><div class="stat-lbl">פתוחות</div></div>
      <div class="stat"><div class="stat-num">💡</div><div class="stat-lbl">רמזים</div></div>
    </div>
    <button class="btn-gold" style="margin-bottom:12px" onclick="mode='select';render()">בחר נושא ✦</button>
    <button class="btn-gold" style="background:rgba(245,200,66,0.15);color:var(--gold);box-shadow:none;border:1.5px solid rgba(245,200,66,0.3)" onclick="startAll()">כל השאלות</button>
  </div>`;
}

function renderSelect(app) {
  const counts = sections.map((_,i) => allQ.filter(q=>q.sec===i).length);
  const tabs = sections.map((s,i) => {
    const sel = selectedSections.includes(i);
    return `<div class="sel-item" onclick="toggleSec(${i})"
      style="background:${sel?'rgba(245,200,66,0.12)':'var(--card)'};border:1.5px solid ${sel?'var(--gold)':'rgba(255,255,255,0.08)'}">
      <div>
        <div style="font-size:16px;font-weight:700;color:${sel?'var(--gold)':'var(--text)'}">${s.label}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:3px">${counts[i]} שאלות</div>
      </div>
      <div style="width:28px;height:28px;border-radius:8px;background:${sel?'var(--gold)':'rgba(255,255,255,0.07)'};display:flex;align-items:center;justify-content:center;font-size:16px;color:${sel?'#0f0c1a':'var(--muted)'}">
        ${sel?'✓':''}
      </div>
    </div>`;
  }).join('');
  app.innerHTML = `<div class="screen">
    <div style="margin-bottom:20px">
      <div style="font-size:26px;font-weight:900;color:var(--gold);margin-bottom:6px">בחר נושאים</div>
      <div style="font-size:15px;color:var(--muted)">בחר אחד או יותר</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">${tabs}</div>
    <button class="btn-gold" onclick="startSelected()" ${selectedSections.length===0?'disabled style="opacity:0.4"':''}>
      התחל (${selectedSections.reduce((s,i)=>s+allQ.filter(q=>q.sec===i).length,0)} שאלות)
    </button>
    <button onclick="mode='start';render()" style="width:100%;margin-top:10px;padding:14px;background:transparent;border:none;color:var(--muted);font-family:Heebo,sans-serif;font-size:15px;cursor:pointer">← חזור</button>
  </div>`;
}

function toggleSec(i) {
  const idx = selectedSections.indexOf(i);
  if (idx >= 0) selectedSections.splice(idx,1);
  else selectedSections.push(i);
  renderSelect(document.getElementById('app'));
}

function startAll() { setupGame(allQ); }
function startSelected() {
  if (selectedSections.length === 0) return;
  setupGame(allQ.filter(q => selectedSections.includes(q.sec)));
}
function setupGame(q) {
  gameQ = q; cur = 0; score = 0; correctCount = 0; wrongCount = 0;
  answered = new Array(q.length).fill(false);
  fbClass = new Array(q.length).fill('');
  fbText  = new Array(q.length).fill('');
  openVals = new Array(q.length).fill('');
  mode = 'game';
  render();
}

function renderGame(app) {
  const q = gameQ[cur];
  const pct  = Math.round((cur / gameQ.length) * 100);
  const letters = ['א','ב','ג','ד'];
  const done = answered[cur];
  const secLabel = sections[q.sec].label;
  const isStudy = q.sec === 4;

  // Badge
  let badgeCls = isStudy ? 'badge-study' : (q.type==='mc' ? 'badge-mc' : 'badge-open');
  let badgeTxt = isStudy
    ? (q.type==='mc' ? '🎓 עיון - רב-ברירה' : '🎓 עיון - פתוחה')
    : (q.type==='mc' ? '🟡 רב-ברירה' : '📝 שאלה פתוחה');

  // Summary box
  const sumHtml = q.summary ? `
    <div class="q-summary">
      <div class="sum-title">📖 רקע קצר - קרא לפני שתענה</div>
      <div class="sum-body">${q.summary}</div>
    </div>` : '';

  // Multi-answer notice
  const multiHtml = q.multi ? `<div class="multi-notice">⚠️ שים לב: יש <strong>יותר מתשובה אחת נכונה!</strong> סמן את כל מה שנכון.</div>` : '';

  // smallHintHtml moved to bottom bar

  // Body
  let body = '';
  if (q.type === 'mc') {
    body = `${multiHtml}<div class="options">` + q.opts.map((opt,i) => {
      let cls = 'opt-btn';
      if (done && i === q.ans) cls += ' correct';
      if (done && fbClass[cur]==='feedback-wrong' && i === /* chosen index stored */ parseInt(answered[cur+'-chosen']||'-1')) cls += ' wrong';
      return `<button class="${cls}" id="o${i}" onclick="pickMC(${i})" ${done?'disabled':''}><span class="opt-letter">${letters[i]}</span><span>${opt}</span></button>`;
    }).join('') + `</div>`;
  } else {
    body = `
      <textarea class="open-area" id="ota" placeholder="כתוב את תשובתך כאן..." ${done?'readonly':''}>${openVals[cur]||''}</textarea>
      <div class="model-answer ${done?'show':''}">${q.modelAns||''}</div>`;
  }

  const fbHtml = done ? `<div class="feedback-bar show ${fbClass[cur]}">${fbText[cur]}</div>` : '';

  let actionHtml = '';
  if (!done && q.type === 'open') {
    actionHtml = `<div class="action-row"><button class="btn-secondary" onclick="submitOpen()">הצג תשובת מדגם</button></div>`;
  } else if (done) {
    actionHtml = `<div class="action-row"><button class="btn-next show" onclick="nextQ()">${cur===gameQ.length-1?'לתוצאות 🏆':'הבאה ←'}</button></div>`;
  }

  app.innerHTML = `<div class="screen">
    <div class="game-top">
      <span class="q-counter">שאלה ${cur+1} / ${gameQ.length}</span>
      <span class="score-badge">⭐ ${score}</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section-label">${secLabel}</div>
    <div class="q-card">
      <span class="q-badge ${badgeCls}">${badgeTxt}</span>
      ${sumHtml}
      <div class="q-text">${q.q}</div>
      ${q.src ? `<div class="q-source">${q.src}</div>` : ''}
    </div>
    ${body}
    ${fbHtml}
    ${actionHtml}
  </div>`;
}

function pickMC(chosen) {
  const q = gameQ[cur];
  if (answered[cur]) return;
  answered[cur] = true;
  const isRight = chosen === q.ans;
  if (isRight) {
    score++; correctCount++;
    fbClass[cur] = 'feedback-correct';
    fbText[cur]  = '✅ נכון! כל הכבוד!';
    playSuccess();
  } else {
    wrongCount++;
    fbClass[cur] = 'feedback-wrong';
    fbText[cur]  = '❌ לא נכון. התשובה הנכונה: ' + q.opts[q.ans];
    playFail();
  }
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    if (i === chosen && !isRight) b.classList.add('wrong');
  });
  const fb = document.createElement('div');
  fb.className = 'feedback-bar show ' + fbClass[cur];
  fb.innerHTML = fbText[cur];
  const opts = document.querySelector('.options');
  opts.after(fb);
  const btn = document.createElement('div');
  btn.className = 'action-row';
  btn.innerHTML = `<button class="btn-next show" onclick="nextQ()">${cur===gameQ.length-1?'לתוצאות 🏆':'הבאה ←'}</button>`;
  fb.after(btn);
}

function submitOpen() {
  const ta = document.getElementById('ota');
  if (ta) openVals[cur] = ta.value;
  answered[cur] = true;
  fbClass[cur] = 'feedback-open';
  fbText[cur]  = 'ראה את תשובת המדגם למעלה';
  render();
}

function nextQ() {
  cur++;
  if (cur >= gameQ.length) mode = 'result';
  render();
}

function renderResult(app) {
  const mc  = gameQ.filter(q=>q.type==='mc').length;
  const pct = mc > 0 ? Math.round((correctCount/mc)*100) : 0;
  let emoji='🏆', msg='מצוין! שולט בחומר';
  if(pct<90){emoji='😊'; msg='טוב מאוד!';}
  if(pct<70){emoji='📚'; msg='כדאי לחזור על החומר';}
  if(pct<50){emoji='💪'; msg='לנסות שוב!';}
  app.innerHTML = `<div class="screen result-box">
    <div class="result-icon">${emoji}</div>
    <div class="result-title">${msg}</div>
    <div class="big-score">${mc>0?correctCount+'/'+mc:'-'}</div>
    <div class="score-label">שאלות רב-ברירה נכונות</div>
    <div class="result-grid">
      <div class="r-stat"><div class="r-stat-num" style="color:var(--correct)">${correctCount}</div><div class="r-stat-lbl">נכונות</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:var(--wrong)">${wrongCount}</div><div class="r-stat-lbl">שגויות</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:var(--gold)">${mc>0?pct+'%':'-'}</div><div class="r-stat-lbl">הצלחה</div></div>
      <div class="r-stat"><div class="r-stat-num" style="color:#a855f7">${score}</div><div class="r-stat-lbl">ניקוד</div></div>
    </div>
    <button class="btn-gold" style="margin-bottom:12px" onclick="setupGame(gameQ)">שחק שוב אותן שאלות</button>
    <button class="btn-gold" style="background:rgba(245,200,66,0.15);color:var(--gold);box-shadow:none;border:1.5px solid rgba(245,200,66,0.3)" onclick="init()">חזור לתפריט</button>
  </div>`;
}

function openHint() {
  if (mode !== 'game' || cur >= gameQ.length) return;
  document.getElementById('hint-text').innerHTML = gameQ[cur].bigHint || gameQ[cur].hint || '';
  document.getElementById('hint-overlay').classList.remove('hidden');
}
function closeHint() {
  document.getElementById('hint-overlay').classList.add('hidden');
}
document.getElementById('hint-overlay').addEventListener('click', function(e){
  if(e.target===this) closeHint();
});

init();
</script>
</body>
</html>
